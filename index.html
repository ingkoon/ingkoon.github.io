      "마지막 전체 백업 이후 변경된 모든 데이터를 백업하는 방식": [1, "차등 백업(Differential Backup)"],
      "정해진 시간을 기준으로 그 이후에 변경된 파일만을 백업하는 방식": [1, "증분 백업(Incremental Backup)"],


    }
    function aa() {
      let html = ""
      if (document.querySelector(".h2").innerHTML == "") {
        document.querySelector(".h2").innerHTML +=
          questions[question][questions[question][0]]
      } else document.querySelector(".h2").innerHTML = ""
    }
    function bb() {
      document.querySelector(".h2").innerHTML = ""
      ans++
      // console.log(ans, wrong)
      init()
    }
    function cc() {
      document.querySelector(".h2").innerHTML = ""
      wrong++
      // console.log(ans, wrong)
      init()
    }
    const shuffleArray = (array) => {
      for (let i = 0; i < array.length; i++) {
        let j = Math.floor(Math.random() * (i + 1))
          ;[array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    function init() {
      document.querySelector("h1").innerHTML = ""
      document.querySelector("h2").innerHTML = ""
      rNum = Math.floor(Math.random() * Object.keys(questions).length)
      question = Object.keys(questions)[rNum]
      examples = questions[question].slice(1)
      shuffleArray(examples)
      document.querySelector("h1").innerHTML += question
      for (let i = 0; i < examples.length; i++) {
        document.querySelector(".h1").innerHTML = question
        document.querySelector(".h12").innerHTML += "<br>"
      }
      document.querySelector(".ansRate").innerHTML = `${ans}/${ans + wrong}/${ans / (ans + wrong) * 100}% - 정답/전체/정답률(%)`
    }
    init()
  </script>
